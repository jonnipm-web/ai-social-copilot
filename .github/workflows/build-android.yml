name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter (versao estavel mais recente)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Android
        run: flutter create --platforms android --project-name ai_social_copilot .

      - name: Fixar AGP para 8.11.1 (compativel com Flutter Gradle plugin)
        run: |
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("com.android.application") version "[^"]*"/id("com.android.application") version "8.11.1"/g' android/settings.gradle.kts
            sed -i 's/id("com.android.library") version "[^"]*"/id("com.android.library") version "8.11.1"/g' android/settings.gradle.kts
            echo "=== settings.gradle.kts ===" && cat android/settings.gradle.kts
          fi

      - name: Configurar Google Sign-In (strings.xml)
        run: |
          mkdir -p android/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">AI Social Copilot</string>\n    <string name="default_web_client_id">221504834589-jll1257ccns2sprai9ps949rv21gf7p2.apps.googleusercontent.com</string>\n</resources>\n' \
            > android/app/src/main/res/values/strings.xml
          echo "=== strings.xml ===" && cat android/app/src/main/res/values/strings.xml

      - name: Exibir SHA-1 do keystore usado na assinatura
        continue-on-error: true
        run: |
          KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v -keystore "$KEYSTORE" -alias androiddebugkey \
              -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "============================================"
          echo "SHA-1 DO KEYSTORE DE ASSINATURA DO CI:"
          keytool -list -v -keystore "$KEYSTORE" -alias androiddebugkey \
            -storepass android -keypass android | grep -E "SHA1:|SHA-1:"
          echo "============================================"
          echo "Adicione este SHA-1 no Google Cloud Console em:"
          echo "APIs e Servicos > Credenciais > Cliente Android > SHA-1"

      - name: Instalar dependências
        run: flutter pub get

      - name: Corrigir file_picker para AGP 8.x (jcenter e namespace se necessario)
        run: |
          find ~/.pub-cache -path "*/file_picker-*/android/build.gradle" | while read f; do
            sed -i 's/jcenter()/mavenCentral()/g' "$f"
            if ! grep -q 'namespace' "$f"; then
              sed -i '/^android {/a\    namespace "com.mr.flutter.plugin.filepicker"' "$f"
            fi
            echo "=== $f ===" && cat "$f"
          done

      - name: Build APK release
        run: flutter build apk --release

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ai-social-copilot-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
