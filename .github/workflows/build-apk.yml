name: Build Android APK

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter (versao estavel mais recente)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Instalar dependências
        run: flutter pub get

      - name: Análise estática (flutter analyze)
        run: flutter analyze --no-pub

      - name: Testes unitários e de integração (flutter test)
        run: flutter test --no-pub

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java (necessário para Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter (versao estavel mais recente)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Android
        run: flutter create --platforms android --project-name ai_social_copilot .

      - name: Fixar AGP para 8.11.1 (compativel com Flutter Gradle plugin)
        run: |
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("com.android.application") version "[^"]*"/id("com.android.application") version "8.11.1"/g' android/settings.gradle.kts
            sed -i 's/id("com.android.library") version "[^"]*"/id("com.android.library") version "8.11.1"/g' android/settings.gradle.kts
            echo "=== settings.gradle.kts ===" && cat android/settings.gradle.kts
          fi

      - name: Instalar dependências
        run: flutter pub get

      - name: Corrigir file_picker para AGP 8.x (jcenter e namespace se necessario)
        run: |
          find ~/.pub-cache -path "*/file_picker-*/android/build.gradle" | while read f; do
            sed -i 's/jcenter()/mavenCentral()/g' "$f"
            if ! grep -q 'namespace' "$f"; then
              sed -i '/^android {/a\    namespace "com.mr.flutter.plugin.filepicker"' "$f"
            fi
            echo "=== $f ===" && cat "$f"
          done

      - name: Build do APK
        run: flutter build apk --release

      - name: Salvar APK como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: ai-social-copilot-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
