name: Deploy Supabase (Migration + Edge Functions)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Fazer login no Supabase
        run: supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Vincular ao projeto
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy da Edge Function analyze-website
        run: supabase functions deploy analyze-website

      - name: Deploy da Edge Function extract-knowledge
        run: supabase functions deploy extract-knowledge

      - name: Deploy da Edge Function improve-post
        run: supabase functions deploy improve-post

      - name: Deploy da Edge Function market-analysis (Fase 9)
        run: supabase functions deploy market-analysis

      - name: Deploy da Edge Function competitor-discovery (Fase 9)
        run: supabase functions deploy competitor-discovery

      - name: Deploy da Edge Function gap-analysis (Fase 9)
        run: supabase functions deploy gap-analysis

      - name: Deploy da Edge Function opportunity-discovery (Fase 9)
        run: supabase functions deploy opportunity-discovery

      - name: Deploy da Edge Function niche-discovery (Fase 9)
        run: supabase functions deploy niche-discovery

      - name: Deploy da Edge Function revenue-planner (Fase 9)
        run: supabase functions deploy revenue-planner
