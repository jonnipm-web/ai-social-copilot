name: Deploy Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Web
        run: flutter create --platforms web .

      - name: Usar CanvasKit local (sem CDN)
        run: |
          python3 - <<'PYEOF'
          import os, re

          # Patch flutter_bootstrap.js para usar canvaskit/ local
          bootstrap = 'web/flutter_bootstrap.js'
          if os.path.exists(bootstrap):
              with open(bootstrap) as f:
                  content = f.read()
              print("=== flutter_bootstrap.js original ===")
              print(content)
              # Adiciona canvasKitBaseUrl no initializeEngine
              new = re.sub(
                  r'initializeEngine\(\s*\)',
                  'initializeEngine({canvasKitBaseUrl: "canvaskit/"})',
                  content
              )
              if new != content:
                  with open(bootstrap, 'w') as f:
                      f.write(new)
                  print("=== Patched! ===")
              else:
                  print("Pattern 'initializeEngine()' not found — printing file for debug:")
              print(new)
          else:
              print(f"File not found: {bootstrap}")
              print("web/ contents:", os.listdir('web') if os.path.exists('web') else 'NO WEB DIR')
          PYEOF

      - name: Instalar dependências
        run: flutter pub get

      - name: Build da versão Web
        run: flutter build web --release --base-href /ai-social-copilot/ --pwa-strategy none

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
