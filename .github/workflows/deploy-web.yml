name: Deploy Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter (versao estavel mais recente)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Web
        run: flutter create --platforms web --project-name ai_social_copilot .

      - name: Instalar dependências
        run: flutter pub get

      - name: Build da versão Web
        run: flutter build web --profile --base-href /ai-social-copilot/ --source-maps

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
