name: Deploy Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Web
        run: flutter create --platforms web .

      - name: Instalar dependências
        run: flutter pub get

      - name: Build da versão Web
        run: flutter build web --release --base-href /ai-social-copilot/ --pwa-strategy none

      - name: Patch flutter_bootstrap.js com CanvasKit local
        run: |
          python3 - <<'PYEOF'
          path = 'build/web/flutter_bootstrap.js'
          with open(path) as f:
              content = f.read()

          changes = []

          # 1) Forca renderer classico 'canvaskit' em vez de wimp/skwasm
          old1 = 'l.initializeEngine(t).then(u=>u.runApp())'
          new1 = 'l.initializeEngine({...t,renderer:"canvaskit",canvasKitBaseUrl:"canvaskit/"}).then(u=>u.runApp())'
          if old1 in content:
              content = content.replace(old1, new1)
              changes.append("renderer forcado para canvaskit")

          # 2) Substitui CDN gstatic por path local
          old2 = 'e.engineRevision&&!e.useLocalCanvasKit?I("https://www.gstatic.com/flutter-canvaskit",e.engineRevision):"canvaskit"'
          if old2 in content:
              content = content.replace(old2, '"canvaskit"')
              changes.append("CDN substituido por canvaskit local")

          if changes:
              with open(path, 'w') as f:
                  f.write(content)
              print("=== Patches aplicados:", ', '.join(changes), "===")
          else:
              print("AVISO: nenhum patch aplicado! Conteudo do arquivo:")
              print(content[:3000])
          PYEOF

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
