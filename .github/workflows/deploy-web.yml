name: Deploy Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Criar arquivo .env com as credenciais
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Adicionar suporte à plataforma Web
        run: flutter create --platforms web .

      - name: Instalar dependências
        run: flutter pub get

      - name: Build da versão Web
        run: flutter build web --release --base-href /ai-social-copilot/ --pwa-strategy none

      - name: Patch flutter_bootstrap.js com CanvasKit local
        run: |
          python3 - <<'PYEOF'
          import re

          path = 'build/web/flutter_bootstrap.js'
          with open(path) as f:
              content = f.read()

          print("=== Original flutter_bootstrap.js ===")
          print(content[:2000])

          new = re.sub(
              r'initializeEngine\(\s*\)',
              'initializeEngine({canvasKitBaseUrl: "canvaskit/"})',
              content
          )

          if new != content:
              with open(path, 'w') as f:
                  f.write(new)
              print("=== Patched com sucesso! ===")
          else:
              print("AVISO: padrao initializeEngine() nao encontrado!")
              print(content[:3000])
          PYEOF

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
