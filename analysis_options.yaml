include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # TODOs não quebram --fatal-warnings
    todo: ignore
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'

linter:
  rules:
    # Regras ativas para Build Week
    # avoid_print: debugPrint() é o padrão Flutter — print() não respeita
    # o buffer de log nem é otimizado pelo Flutter framework.
    avoid_print: true
    # Supabase retorna dynamic com frequência — desativado para evitar falsos positivos
    avoid_dynamic_calls: false
    #
    # Regras desativadas para Build Week (código legado extenso):
    # always_declare_return_types — produziria centenas de itens em código legado.
    #   Reativar após migração incremental do codebase.
    # prefer_const_constructors — idem; widgets não marcados const geram volume excessivo.
    # prefer_final_fields — idem; muitos campos de service não são final por design.
