name: ai_social_copilot
description: AI-powered social media post copilot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — fixado em <2.15.0 para evitar dependência no passkeys_web (crasha no GitHub Pages)
  supabase_flutter: ">=2.5.6 <2.15.0"

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegação
  go_router: ^14.2.7

  # UI utilitários
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Env / config
  flutter_dotenv: ^5.1.0

  # Google Drive integration
  google_sign_in: ^6.2.1
  http: ^1.2.1

  # IVE Memory Layer — persistência local
  shared_preferences: ^2.3.0

  # IVE Visual Runtime — Rive character integration
  rive: ^0.13.12

  # File import (Smart Import Engine)
  # TODAS as versoes estaveis de file_picker (5.x–11.x) dependem de win32 ^2–5,
  # incompativel com device_info_plus ^13 e package_info_plus ^10 (win32 ^6).
  # A versao 12.0.0-beta.1 e a primeira a usar win32 ^6 — unica opcao compativel.
  file_picker: ">=12.0.0-beta.1"

  # Asset Ingestion Hub
  # archive: ZIP extraction com segurança (path traversal, bomb detection)
  archive: ^3.6.1
  # crypto: SHA-256 fingerprint para de-duplicação por conteúdo
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

# Forçar versões mais novas dos plugins web para corrigir null check
dependency_overrides:
  url_launcher_web: ^2.4.3
  app_links: ^7.0.0
  device_info_plus: ^13.0.0
  package_info_plus: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/ive/reference/
    # assets/ive/rive/ removido — nenhum arquivo .riv existe ainda (Build Week).
    # IveRiveRuntime.initialize() lança FlutterError capturado pelo controller,
    # que cai automaticamente para IveVisualFallback (PNG).
    # Adicionar de volta quando ive_executive_v1.riv for entregue pelo time de design.
