name: ai_social_copilot
description: AI-powered social media post copilot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — fixado em <2.15.0 para evitar dependência no passkeys_web (crasha no GitHub Pages)
  supabase_flutter: ">=2.5.6 <2.15.0"

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegação
  go_router: ^14.2.7

  # UI utilitários
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Env / config
  flutter_dotenv: ^5.1.0

  # File import (Smart Import Engine)
  file_picker: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Forçar versões mais novas dos plugins web para corrigir null check
dependency_overrides:
  url_launcher_web: ^2.4.3
  app_links: ^7.0.0
  device_info_plus: ^13.0.0
  package_info_plus: ">=9.1.0 <10.0.0"

flutter:
  uses-material-design: true
  assets:
    - .env
