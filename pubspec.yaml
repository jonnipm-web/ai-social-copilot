name: ai_social_copilot
description: AI-powered social media post copilot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegação
  go_router: ^14.2.7

  # UI utilitários
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Env / config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Forçar versões mais novas dos plugins web para corrigir null check
dependency_overrides:
  url_launcher_web: ^2.4.3
  app_links: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
